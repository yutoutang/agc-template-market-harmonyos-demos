<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 第三方信息共享清单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .third-party-list {
            margin-bottom: 30px;
        }
        .third-party-list table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .third-party-list th, .third-party-list td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        .third-party-list th {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>第三方信息共享清单</h2>
        <div class="third-party-list">
            <table>
                <tr>
                    <th>合作方名称</th>
                    <th>共享信息类型</th>
                    <th>共享目的</th>
                </tr>
                <tr>
                    <td>支付服务提供商</td>
                    <td>订单信息、支付状态</td>
                    <td>完成交易支付</td>
                </tr>
                <tr>
                    <td>物流服务供应商</td>
                    <td>收货地址、订单详情</td>
                    <td>安排商品配送</td>
                </tr>
                <tr>
                    <td>广告服务平台</td>
                    <td>用户行为数据</td>
                    <td>提供个性化广告</td>
                </tr>
                <tr>
                    <td>数据分析公司</td>
                    <td>匿名化用户数据</td>
                    <td>优化平台服务</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
