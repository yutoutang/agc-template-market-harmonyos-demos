<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息收集清单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .personal-info-list {
            margin-top: 20px;
        }
        .personal-info-list li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>个人信息收集清单</h2>
        <div class="personal-info-list">
            <ul>
                <li>用户ID - 用于唯一标识用户身份</li>
                <li>手机号码 - 用于注册、登录和验证</li>
                <li>电子邮箱 - 用于通知和密码重置</li>
                <li>收货地址 - 用于商品配送</li>
                <li>浏览记录 - 用于个性化推荐</li>
                <li>订单信息 - 包括商品、数量和金额</li>
                <li>支付信息 - 包括支付方式和交易状态</li>
                <li>设备信息 - 包括设备型号和操作系统</li>
                <li>位置信息 - 用于本地服务推荐</li>
                <li>cookie信息 - 用于保持登录状态</li>
            </ul>
        </div>
    </div>
</body>
</html>
